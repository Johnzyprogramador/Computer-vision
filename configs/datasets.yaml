# Dataset catalog. Licenses/terms can change: verify at the source before redistribution.
datasets:
  d_fire:
    task: detection
    classes: [fire, smoke]
    size: "21,000+ images, including 9,838 negative images"
    source: "https://github.com/gaia-solutions-on-demand/DFireDataset"
    access: manual
    notes: "YOLO boxes; unusually useful negative set; official train/val/test download available."
  figlib:
    task: temporal_classification
    classes: [smoke]
    size: "nearly 25,000 labeled images from fixed cameras"
    source: "https://arxiv.org/abs/2112.08598"
    access: manual
    notes: "Official split JSON schema is supported by scripts/prepare_figlib.py."
  pyronear_2025:
    task: temporal_detection
    classes: [smoke]
    size: "50,000 images, about 150,000 annotations, 640 wildfire events"
    source: "https://github.com/joseg20/wildfires2025"
    access: manual_google_drive
    notes: "Primary early-smoke recommendation; YOLO images plus event video sequences."
  corsican_fire_database:
    task: segmentation_video
    classes: [fire]
    source: "https://cfdb.univ-corse.fr/"
    access: manual
    notes: "Drone wildfire imagery. Keep complete video sequences in a single split."
  firesense:
    task: video_classification
    classes: [fire, smoke]
    source: "https://zenodo.org/communities/firesense/"
    access: manual
    notes: "Indoor/outdoor multimodal fire videos; inspect each record's terms and annotations."
  smoke_bench:
    task: restoration
    classes: [smoke]
    source: "https://github.com/QianfengY/SmokeBench"
    access: manual
    notes: "Paired smoky/clean images; supported as a smoke classification robustness dataset."
  fire_sentry:
    task: segmentation_video
    classes: [fire]
    source: "https://github.com/Munan222/FireSentry-Benchmark-Dataset"
    access: public_region_a
    notes: "Infrared videos paired with fire-mask videos; forecasting/segmentation, not ignition detection."
  flame_3:
    task: thermal_detection_segmentation
    classes: [fire]
    source: "https://arxiv.org/abs/2412.02831"
    access: kaggle_subset_or_request
    notes: "Synchronized visual and radiometric thermal UAV data from prescribed burns."
  d_fire_videos:
    task: temporal_detection
    classes: [fire, smoke]
    source: "https://github.com/gaia-solutions-on-demand/DFireDataset"
    access: manual
    notes: "Surveillance videos linked by D-Fire; preserve source video IDs."

# Add FASDD only after confirming its current official host and redistribution terms.
# Avoid Kaggle/Roboflow mirrors as canonical sources unless provenance is documented.
